<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker | Pro</title>
   
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="container">
        <header>
            <h2>🌤️ Weather Tracker</h2>
            <p class="subtitle">Async JS Lab Assignment</p>
        </header>
        
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name (e.g., London)">
            <button id="search-btn">
                <span class="btn-text">Search</span>
                <span class="loader" id="btn-loader"></span>
            </button>
        </div>

        <div id="error-msg" class="error-box"></div>

        <div id="weather-display" class="weather-card">
            <div class="weather-main">
                <img id="weather-icon" src="" alt="Weather Icon">
                <h3 id="city-name">--</h3>
                <p id="date-display">--</p>
            </div>
            <div class="weather-details">
                <div class="temp-box">
                    <span id="temp">--</span><span class="unit">°C</span>
                </div>
                <p id="condition">--</p>
            </div>
            <div class="weather-extra">
                <div class="extra-item">
                    <span>💧</span>
                    <span id="humidity">--%</span>
                </div>
                <div class="extra-item">
                    <span>💨</span>
                    <span id="wind">-- m/s</span>
                </div>
            </div>
        </div>

        <div class="history-section">
            <h4>🕒 Recent Searches</h4>
            <ul class="history-list" id="history-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
